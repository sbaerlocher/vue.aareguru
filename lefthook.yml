pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{js,cjs,mjs,ts,vue,json,md,yml,yaml,css}"
      run: npx prettier --check {staged_files}
    eslint:
      glob: "*.{js,cjs,mjs,ts,vue}"
      run: npx eslint {staged_files}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: npm run type-check
    test:
      run: npm test
