pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{vue,ts,js,json,md,css,yml,yaml}"
      run: npx --no -- prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{js,cjs,mjs,ts,vue}"
      run: npx --no -- eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: npm run typecheck
    test:
      run: npm test
