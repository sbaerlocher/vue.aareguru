pre-commit:
  parallel: true
  commands:
    prettier:
      glob: "*.{vue,ts,js,cjs,mjs,json,md,css,yml,yaml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    eslint:
      glob: "*.{js,cjs,mjs,ts,vue}"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test
