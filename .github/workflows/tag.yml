---
name: Software Release
run-name: |
  Release ${{ github.ref_name }} by @${{ github.actor }}

"on":
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    name: NPM Package Release
    uses: sbaerlocher/.github/.github/workflows/release-npm.yml@2026-06-21
    with:
      package-manager: "pnpm"
      node-version-file: ".nvmrc"
      run-build: true
      run-tests: true
      create-github-release: true
      generate-changelog: true
      enable-provenance: true
      enable-sbom: true
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
