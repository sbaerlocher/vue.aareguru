---
name: Continuous Integration

"on":
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          # renovate: datasource=npm depName=node versioning=node
          - node-version: "20.x"
            primary: true
          - node-version: "22.x"
            primary: false
          - node-version: "24.x"
            primary: false
    uses: sbaerlocher/.github/.github/workflows/ci-js.yml@2026-03-22
    with:
      package-manager: "npm"
      node-version: ${{ matrix.node-version }}
      primary: ${{ matrix.primary }}
      enable-codecov: true
      enable-sarif-upload: true
      artifact-name-prefix: "node-${{ matrix.node-version }}"
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  status:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [ci]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "All checks passed"
