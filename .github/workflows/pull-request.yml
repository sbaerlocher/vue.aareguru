---
name: Pull Request
run-name: |
  Pull Request by @${{ github.actor }}

"on":
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: read
  actions: read
  id-token: write

jobs:
  ci:
    name: Quality, Tests, Build
    uses: sbaerlocher/.github/.github/workflows/ci-js.yml@2026-06-26
    with:
      package-manager: "pnpm"
      enable-codecov: true
      enable-sarif-upload: true
    secrets: inherit

  code-analysis:
    name: SAST (CodeQL)
    uses: sbaerlocher/.github/.github/workflows/security-code.yml@2026-06-26
    with:
      languages: '["javascript-typescript"]'
      node-version-file: ".nvmrc"
      concurrency-suffix: code

  code-review:
    name: Claude Code Review
    uses: sbaerlocher/.github/.github/workflows/ai-claude-review.yml@2026-06-26
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
